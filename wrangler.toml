#:schema node_modules/wrangler/config-schema.json
name = "task-tracker"
type = "javascript"
account_id = "f8118661f7c4afdc2ddbabde0b65c8e9"
workers_dev = true
main = "src/index.js"
compatibility_date = "2024-01-15"

[[d1_databases]]
binding = "DB"
database_name = "task-tracker"
database_id = "b0f72d2e-4e07-411f-9b28-d1cd767284a0"

[build]
command = "npm install"
cwd = "."

[build.upload]
format = "service-worker"

[env.production]
name = "task-tracker-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "task-tracker"
database_id = "b0f72d2e-4e07-411f-9b28-d1cd767284a0"
